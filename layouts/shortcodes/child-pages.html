<!-- layouts/shortcodes/child-pages.html -->
<ul>
    {{ if .Page.Pages }}
      {{ range .Page.Pages }}
        <li><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></li>
      {{ end }}
    {{ else }}
      {{ range .Page.Parent.Pages }}
        {{ if ne .RelPermalink $.Page.RelPermalink }}
          <li><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></li>
        {{ end }}
      {{ end }}
    {{ end }}
  </ul>
